# Create a temp db service for dev environments
services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: hackku
      POSTGRES_PASSWORD: hackku
      POSTGRES_DB: hackku_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

